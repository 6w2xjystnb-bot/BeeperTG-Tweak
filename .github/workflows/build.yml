name: Build BeeperTG Tweak

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos dependencies
        run: |
          brew install dpkg ldid

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: 'theos'
          theos-src: 'https://github.com/theos/theos'
          theos-sdks: 'https://github.com/theos/sdks'

      - name: Build dylib
        run: |
          export THEOS=./theos
          make clean
          make FINALPACKAGE=1

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeeperTG-dylib
          path: .theos/obj/**/*.dylib
