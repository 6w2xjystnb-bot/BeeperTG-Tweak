name: Build BeeperTG Tweak

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install dpkg ldid

      - name: Clone Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -LO https://github.com/theos/sdks/archive/refs/heads/master.zip
          unzip -q master.zip -d $THEOS/sdks
          mv $THEOS/sdks/sdks-master/*.sdk $THEOS/sdks/
          rm -rf $THEOS/sdks/sdks-master master.zip
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build dylib
        run: |
          export THEOS=${{ github.workspace }}/theos
          make clean
          make FINALPACKAGE=1

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeeperTG-dylib
          path: .theos/obj/**/*.dylib
