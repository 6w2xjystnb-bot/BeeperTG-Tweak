name: Build BeeperTG Tweak

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install dpkg ldid
          which make
          which clang

      - name: Clone Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ${{ github.workspace }}/theos
          curl -LO https://github.com/theos/sdks/archive/refs/heads/master.zip
          unzip -q master.zip
          mkdir -p ${{ github.workspace }}/theos/sdks
          mv sdks-master/*.sdk ${{ github.workspace }}/theos/sdks/
          rm -rf sdks-master master.zip

      - name: Build dylib
        run: |
          set -o pipefail
          export THEOS=${{ github.workspace }}/theos
          export PATH=$THEOS/bin:$PATH
          make clean 2>&1 | tee build.log
          make FINALPACKAGE=1 2>&1 | tee -a build.log
          echo "=== .theos/obj contents ==="
          ls -la .theos/obj/ 2>&1 | tee -a build.log || true
          find .theos/obj -type f 2>&1 | tee -a build.log || true

      - name: Debug output
        if: always()
        run: |
          echo "=== LAST 100 LINES OF BUILD LOG ==="
          tail -n 100 build.log || true

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: BeeperTG-dylib
          path: .theos/obj/**/*.dylib
