name: Build BeeperTG Tweak

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Theos
        uses: actions/cache@v4
        id: theos-cache
        with:
          path: theos
          key: ${{ runner.os }}-theos-${{ hashFiles('Makefile') }}
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: Setup Theos
        if: steps.theos-cache.outputs.cache-hit != 'true'
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: 'theos'
          theos-src: 'https://github.com/theos/theos'
          theos-sdks: 'https://github.com/theos/sdks'

      - name: Build package
        run: |
          export THEOS=./theos
          make clean
          make package FINALPACKAGE=1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeeperTG-deb
          path: packages/*.deb
