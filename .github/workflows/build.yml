name: Build BeeperTG Tweak

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install dpkg ldid
          which make
          which clang
          clang --version

      - name: Clone Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ${{ github.workspace }}/theos
          curl -LO https://github.com/theos/sdks/archive/refs/heads/master.zip
          unzip -q master.zip
          mkdir -p ${{ github.workspace }}/theos/sdks
          mv sdks-master/*.sdk ${{ github.workspace }}/theos/sdks/
          rm -rf sdks-master master.zip
          ls ${{ github.workspace }}/theos/sdks/
          ls ${{ github.workspace }}/theos/makefiles/

      - name: Build dylib
        run: |
          export THEOS=${{ github.workspace }}/theos
          export PATH=$THEOS/bin:$PATH
          echo "THEOS=$THEOS"
          make clean || true
          make FINALPACKAGE=1 2>&1 | tee build.log
          echo "=== Theos output tree ==="
          find .theos/obj -type f || true
          echo "=== Build log ==="
          cat build.log

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log

      - name: Upload Theos obj folder
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: theos-obj
          path: .theos/obj/**
